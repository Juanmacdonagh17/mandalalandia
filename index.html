<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandala</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f5f4f0;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.4rem;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    #mandala-svg {
      display: block;
      cursor: crosshair;
    }

    .region {
      stroke: #bbb;
      stroke-width: 0.6;
      transition: filter 0.08s;
    }
    .region:hover { filter: brightness(0.88); cursor: pointer; }

    #palette {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin: 1.4rem 0 0.8rem;
      max-width: 560px;
      width: 100%;
    }

    .color-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .group-label {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bbb;
      width: 52px;
      flex-shrink: 0;
      text-align: right;
    }

    .group-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      outline: none;
      transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: #333; transform: scale(1.2); }

    #controls {
      display: flex;
      gap: 0.8rem;
      margin-top: 0.6rem;
    }

    button.ctrl {
      background: none;
      border: 1px solid #c8c8c8;
      padding: 0.45rem 1.1rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      color: #666;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    button.ctrl:hover { background: #333; color: #fff; border-color: #333; }
  </style>
</head>
<body>

<header>
  <h1>Mandala</h1>
</header>

<svg id="mandala-svg" width="540" height="540" viewBox="0 0 540 540">
  <rect width="540" height="540" fill="#fff" />
</svg>

<div id="palette"></div>

<div id="controls">
  <button class="ctrl" id="btn-undo">Undo</button>
  <button class="ctrl" id="btn-reset">Reset</button>
  <button class="ctrl" id="btn-new">New Design</button>
  <button class="ctrl" id="btn-download">Download</button>
</div>

// ── Seeded RNG ───────────────────────────────────────────────────────────────
function makeRng(seed) {
  let s = seed >>> 0;
  return () => {
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    return (s >>> 0) / 0xffffffff;
  };
}

function rngInt(rng, min, max) { return min + Math.floor(rng() * (max - min + 1)); }
function rngPick(rng, arr) { return arr[Math.floor(rng() * arr.length)]; }

// ── SVG helpers ──────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const CX = 270, CY = 270;

function svgEl(tag, attrs) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function polarXY(angle, r) {
  return [CX + r * Math.cos(angle), CY + r * Math.sin(angle)];
}

function wedgePath(r0, r1, a0, a1) {
  const [ax, ay] = polarXY(a0, r0);
  const [bx, by] = polarXY(a1, r0);
  const [cx, cy] = polarXY(a1, r1);
  const [dx, dy] = polarXY(a0, r1);
  const lg = (a1 - a0 > Math.PI) ? 1 : 0;
  return `M${ax} ${ay} A${r0} ${r0} 0 ${lg} 1 ${bx} ${by} L${cx} ${cy} A${r1} ${r1} 0 ${lg} 0 ${dx} ${dy}Z`;
}

// ── Mandala generation ───────────────────────────────────────────────────────
const svg = document.getElementById('mandala-svg');
let groups = {};

function generateMandala(seed) {
  while (svg.children.length > 1) svg.removeChild(svg.lastChild);
  groups = {};

  const rng = makeRng(seed);
  let gid = 0;

  function newGroup() { return gid++; }

  function addRegion(elem, groupId) {
    if (!groups[groupId]) groups[groupId] = [];
    groups[groupId].push(elem);
    elem.dataset.group = groupId;
    elem.classList.add('region');
    elem.style.fill = '#fff';
    svg.appendChild(elem);
  }

  function addRing(r0, r1, n, subs) {
    const angleStep = (2 * Math.PI) / n;
    const subStep = angleStep / subs;
    const subGroups = Array.from({ length: subs }, newGroup);
    for (let i = 0; i < n; i++) {
      for (let s = 0; s < subs; s++) {
        const a0 = i * angleStep + s * subStep - Math.PI / 2;
        addRegion(svgEl('path', { d: wedgePath(r0, r1, a0, a0 + subStep) }), subGroups[s]);
      }
    }
  }

  function addDotRing(r, n, dotR) {
    const g = newGroup();
    const step = (2 * Math.PI) / n;
    for (let i = 0; i < n; i++) {
      const angle = (i + 0.5) * step - Math.PI / 2;
      addRegion(svgEl('circle', {
        cx: CX + r * Math.cos(angle),
        cy: CY + r * Math.sin(angle),
        r: dotR
      }), g);
    }
  }

  // ── Randomised structure ──
  const baseN  = rngPick(rng, [6, 8, 10]);
  const innerR = rngInt(rng, 20, 32);
  const maxR   = 256;

  // Center
  { const g = newGroup(); addRegion(svgEl('circle', { cx: CX, cy: CY, r: innerR }), g); }

  let cur = innerR;
  const numRings = rngInt(rng, 3, 6);

  for (let i = 0; i < numRings && cur < maxR - 20; i++) {
    // Thin divider between rings
    if (i > 0) {
      const dw = rngInt(rng, 3, 7);
      const de = cur + dw;
      if (de < maxR - 15) {
        const dn = baseN * rngPick(rng, [1, 2, 3]);
        addRing(cur, de, dn, 1);
        cur = de;
      }
    }

    // Dot accent at boundary (random chance)
    if (i > 0 && rng() > 0.55) {
      const dotN = baseN * rngPick(rng, [1, 2]);
      const dotR = rngInt(rng, 4, 8);
      if (cur + dotR * 2 < maxR - 10) {
        addDotRing(cur, dotN, dotR);
      }
    }

    // Main ring
    const remaining  = maxR - cur;
    const maxWidth   = Math.min(remaining - 15, 60);
    if (maxWidth < 18) break;
    const width = rngInt(rng, 18, maxWidth);
    const end   = cur + width;
    const mult  = rngPick(rng, [1, 1, 2, 2, 3]);
    const subs  = mult === 1 ? rngPick(rng, [1, 2, 2, 3]) : 1;
    addRing(cur, end, baseN * mult, subs);
    cur = end;
  }

  // Outer border strip
  if (cur < maxR - 4) {
    const borderN = baseN * rngPick(rng, [2, 3, 4]);
    addRing(cur, Math.min(cur + 6, maxR), borderN, 1);
    cur = Math.min(cur + 6, maxR);
  }

  // Bounding circle
  svg.appendChild(svgEl('circle', { cx: CX, cy: CY, r: cur,
    fill: 'none', stroke: '#bbb', 'stroke-width': 0.6, 'pointer-events': 'none' }));
}

// ── State ────────────────────────────────────────────────────────────────────
let selectedColor = null;
let undoStack = [];

// ── Click to fill ────────────────────────────────────────────────────────────
svg.addEventListener('click', e => {
  if (!selectedColor) return;
  const target = e.target;
  if (!target.classList.contains('region')) return;
  const members = groups[target.dataset.group];
  if (!members) return;
  const snap = members.map(m => ({ el: m, prev: m.style.fill || '#fff' }));
  members.forEach(m => m.style.fill = selectedColor);
  undoStack.push(snap);
});

// ── Colour grouping ──────────────────────────────────────────────────────────
function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0, l = (max+min)/2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [h*360, s, l];
}

const GROUP_ORDER = ['dark','neutral','red','orange','yellow','green','teal','blue','purple','pink','light'];
const GROUP_LABELS = {
  dark:'Darks', neutral:'Neutrals', red:'Reds', orange:'Oranges',
  yellow:'Yellows', green:'Greens', teal:'Teals', blue:'Blues',
  purple:'Purples', pink:'Pinks', light:'Lights'
};

function colorGroup(hex) {
  const [h, s, l] = hexToHsl(hex);
  if (l < 0.13) return 'dark';
  if (l > 0.88) return 'light';
  if (s < 0.13) return 'neutral';
  if (h < 20 || h >= 340) return 'red';
  if (h < 45) return 'orange';
  if (h < 72) return 'yellow';
  if (h < 160) return 'green';
  if (h < 200) return 'teal';
  if (h < 265) return 'blue';
  if (h < 310) return 'purple';
  return 'pink';
}

function buildPalette() {
  // Collect all unique colours across all parks
  const seen = new Set();
  const byGroup = {};
  GROUP_ORDER.forEach(g => byGroup[g] = []);

  PARKS.forEach(p => p.colors.forEach(hex => {
    const key = hex.toUpperCase();
    if (seen.has(key)) return;
    seen.add(key);
    const g = colorGroup(key);
    byGroup[g].push({ hex: key, hsl: hexToHsl(key) });
  }));

  // Sort each group by lightness (dark → light)
  GROUP_ORDER.forEach(g => byGroup[g].sort((a,b) => a.hsl[2] - b.hsl[2]));

  const palette = document.getElementById('palette');
  palette.innerHTML = '';

  GROUP_ORDER.forEach(g => {
    const colours = byGroup[g];
    if (!colours.length) return;

    const row = document.createElement('div');
    row.className = 'color-group';

    const label = document.createElement('span');
    label.className = 'group-label';
    label.textContent = GROUP_LABELS[g];
    row.appendChild(label);

    const swatches = document.createElement('div');
    swatches.className = 'group-swatches';

    colours.forEach(({ hex }) => {
      const s = document.createElement('button');
      s.className = 'swatch';
      s.style.background = hex;
      s.title = hex;
      s.setAttribute('aria-label', hex);
      s.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
        selectedColor = hex;
      });
      swatches.appendChild(s);
    });

    row.appendChild(swatches);
    palette.appendChild(row);
  });

  // Select the first colour by default
  const first = palette.querySelector('.swatch');
  if (first) { first.classList.add('active'); selectedColor = first.title; }
}

// ── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('btn-undo').addEventListener('click', () => {
  if (!undoStack.length) return;
  undoStack.pop().forEach(({ el, prev }) => el.style.fill = prev);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  document.querySelectorAll('.region').forEach(e => e.style.fill = '#fff');
  undoStack = [];
});

document.getElementById('btn-new').addEventListener('click', () => {
  undoStack = [];
  generateMandala(Math.random() * 0xffffffff | 0);
});

document.getElementById('btn-download').addEventListener('click', () => {
  const xml = new XMLSerializer().serializeToString(svg);
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 540;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const url = URL.createObjectURL(new Blob([xml], { type: 'image/svg+xml;charset=utf-8' }));
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    Object.assign(document.createElement('a'), {
      download: 'mandala.png',
      href: canvas.toDataURL('image/png')
    }).click();
  };
  img.src = url;
});

// ── Init ─────────────────────────────────────────────────────────────────────
buildPalette();
generateMandala(Math.random() * 0xffffffff | 0);
</script>
